name: Monitor Drawdown

on:
  schedule:
    # GitHub Actions 使用 UTC；下面分别对应上海时区每天 09:30、11:30、15:00、20:00
    # UTC 01:30 = Asia/Shanghai 09:30
    - cron: "30 1 * * 1-5"
    # UTC 03:30 = Asia/Shanghai 11:30
    - cron: "30 3 * * 1-5"
    # UTC 07:00 = Asia/Shanghai 15:00
    - cron: "0 7 * * 1-5"
    # UTC 12:00 = Asia/Shanghai 20:00
    - cron: "0 12 * * 1-5"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install akshare pandas requests pyyaml tickflow pytest pycryptodome

      - name: Run monitor
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          JISILU_USERNAME: ${{ secrets.JISILU_USERNAME }}
          JISILU_PASSWORD: ${{ secrets.JISILU_PASSWORD }}
          CONFIG_PATH: ./config.yaml
        run: python monitor_drawdown.py

