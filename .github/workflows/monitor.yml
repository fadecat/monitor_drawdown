name: Monitor Drawdown

on:
  schedule:
    # GitHub Actions 使用 UTC，且整点/半点任务拥堵严重经常被跳过，所以分钟错开到非常见值
    # UTC 01:37 = Asia/Shanghai 09:37（开盘后）
    - cron: "37 1 * * 1-5"
    # UTC 03:37 = Asia/Shanghai 11:37（午盘）
    - cron: "37 3 * * 1-5"
    # UTC 07:07 = Asia/Shanghai 15:07（收盘后）
    - cron: "7 7 * * 1-5"
    # UTC 12:17 = Asia/Shanghai 20:17（晚间复盘）
    - cron: "17 12 * * 1-5"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install akshare pandas requests pyyaml tickflow pytest pycryptodome

      - name: Run monitor
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          JISILU_USERNAME: ${{ secrets.JISILU_USERNAME }}
          JISILU_PASSWORD: ${{ secrets.JISILU_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          CONFIG_PATH: ./config.yaml
        run: python monitor_drawdown.py
