name: Style Rotation Email

on:
  schedule:
    # GitHub Actions 使用 UTC，错开整点拥堵；UTC 07:07 = Asia/Shanghai 15:07（收盘后）
    # - cron: "7 7 * * 1-5"
  workflow_dispatch:

jobs:
  style-rotation-email:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install CJK fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml matplotlib pandas akshare tickflow pytest pycryptodome

      - name: Send style rotation email
        env:
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: python send_style_rotation_email.py
